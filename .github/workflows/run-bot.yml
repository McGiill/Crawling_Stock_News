name: Run Stock News Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"
    - cron: "30 9 * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-5-mini' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          WATCHLIST: ${{ secrets.WATCHLIST }}
          MAX_ARTICLES_PER_SYMBOL: ${{ secrets.MAX_ARTICLES_PER_SYMBOL || '5' }}
          REQUEST_TIMEOUT_SECONDS: ${{ secrets.REQUEST_TIMEOUT_SECONDS || '20' }}
        run: python -m stock_news_bot.main

      - name: Commit sent article history
        run: |
          if git diff --quiet -- data/sent_articles.json; then
            echo "No history changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sent_articles.json
          git commit -m "chore: update sent article history"
          git push
